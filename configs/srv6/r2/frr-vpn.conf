frr version 8.4_git
frr defaults traditional
hostname r2
log syslog informational
service integrated-vtysh-config
ipv6 forwarding
!
interface lo
 ipv6 address 2001:db8:2::2/128
 ipv6 router isis CORE
 isis passive
!
interface eth1
 ipv6 address 2001:db8:12::2/64
 ipv6 router isis CORE
 isis network point-to-point
 isis hello-interval 3
!
interface eth2
 ipv6 address 2001:db8:23::2/64
 ipv6 router isis CORE
 isis network point-to-point
 isis hello-interval 3
!
router isis CORE
 net 49.0001.0000.0000.0002.00
 is-type level-2-only
 metric-style wide
 topology ipv6-unicast
 redistribute ipv6 connected level-2
 segment-routing srv6
  locator LOC2
 exit
!
segment-routing
 srv6
  locators
   locator LOC2
    prefix 2001:db8:2::/64
   exit
  exit
 exit
!
router bgp 65002
 bgp router-id 2.2.2.2
 no bgp default ipv4-unicast
 neighbor 2001:db8:1::1 remote-as 65001
 neighbor 2001:db8:1::1 update-source lo
 neighbor 2001:db8:3::3 remote-as 65003
 neighbor 2001:db8:3::3 update-source lo
 !
 address-family ipv6 vpn
  neighbor 2001:db8:1::1 activate
  neighbor 2001:db8:1::1 route-reflector-client
  neighbor 2001:db8:3::3 activate
  neighbor 2001:db8:3::3 route-reflector-client
 exit-address-family
!
line vty
!
